AWSTemplateFormatVersion: '2010-09-09'
Description: Customer Feedback Pipeline — multimodal data processing with AWS AI services

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket for Lambda code and feedback data
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging, dev]

Resources:

  # --- IAM Role for Lambda functions ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'feedback-pipeline-lambda-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FeedbackPipelineAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:Converse
                Resource: '*'
              - Effect: Allow
                Action:
                  - comprehend:DetectEntities
                  - comprehend:DetectSentiment
                Resource: '*'
              - Effect: Allow
                Action:
                  - textract:DetectDocumentText
                Resource: '*'
              - Effect: Allow
                Action:
                  - rekognition:DetectLabels
                Resource: '*'
              - Effect: Allow
                Action:
                  - transcribe:StartTranscriptionJob
                  - transcribe:GetTranscriptionJob
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  # --- Text Quality Scorer Lambda ---
  QualityScorerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'feedback-quality-scorer-${Environment}'
      Runtime: python3.13
      Handler: src.quality_scorer_lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: customer-feedback-pipeline/lambda-package.zip
      Timeout: 30
      MemorySize: 256

  # --- Text Processor Lambda ---
  TextProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'feedback-text-processor-${Environment}'
      Runtime: python3.13
      Handler: src.text_processor_lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: customer-feedback-pipeline/lambda-package.zip
      Timeout: 60
      MemorySize: 256

  # --- Image Processor Lambda ---
  ImageProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'feedback-image-processor-${Environment}'
      Runtime: python3.13
      Handler: src.image_processor_lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: customer-feedback-pipeline/lambda-package.zip
      Timeout: 120
      MemorySize: 512

  # --- Bedrock Analyzer Lambda ---
  AnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'feedback-analyzer-${Environment}'
      Runtime: python3.13
      Handler: src.analyzer_lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: customer-feedback-pipeline/lambda-package.zip
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          MODEL_ID: amazon.nova-lite-v1:0

  # --- CloudWatch Dashboard ---
  PipelineDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'FeedbackPipeline-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "title": "Validation Pass/Fail",
                "metrics": [
                  ["CustomerFeedbackPipeline", "ValidationPassed"],
                  ["CustomerFeedbackPipeline", "ValidationFailed"]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}"
              },
              "width": 12,
              "height": 6
            },
            {
              "type": "metric",
              "properties": {
                "title": "Processing Latency by Modality",
                "metrics": [
                  ["CustomerFeedbackPipeline", "TextProcessingLatency"],
                  ["CustomerFeedbackPipeline", "ImageProcessingLatency"],
                  ["CustomerFeedbackPipeline", "AudioProcessingLatency"],
                  ["CustomerFeedbackPipeline", "AnalysisLatency"]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}"
              },
              "width": 12,
              "height": 6
            }
          ]
        }

  # --- CloudWatch Alarm for high validation failure rate ---
  ValidationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'FeedbackPipeline-HighValidationFailure-${Environment}'
      AlarmDescription: Fires when validation failure count exceeds threshold
      Namespace: CustomerFeedbackPipeline
      MetricName: ValidationFailed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  QualityScorerArn:
    Value: !GetAtt QualityScorerFunction.Arn
  TextProcessorArn:
    Value: !GetAtt TextProcessorFunction.Arn
  ImageProcessorArn:
    Value: !GetAtt ImageProcessorFunction.Arn
  AnalyzerArn:
    Value: !GetAtt AnalyzerFunction.Arn
  DashboardUrl:
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=FeedbackPipeline-${Environment}'
